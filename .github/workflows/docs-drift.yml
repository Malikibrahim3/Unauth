name: Docs Drift

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  signals-readme-check:
    name: README signals table check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check README signal table drift
        run: npm run docs:check
