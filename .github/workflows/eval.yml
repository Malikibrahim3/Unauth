name: Engine Eval

on: [pull_request]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run engine eval
        id: eval
        env:
          IDENTITY_SALT: ${{ secrets.IDENTITY_SALT || 'ci-salt-000000000000000000000000000000000000' }}
        run: npm run eval -- test-data/realistic_fraud_dataset.csv

      - name: Post F1 to PR
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            // The exit code from the eval step is the primary CI gate.
            // This step posts a summary comment as a nice-to-have.
            const outcome = '${{ steps.eval.outcome }}';
            const passed = outcome === 'success';
            const emoji = passed ? '✅' : '❌';
            const status = passed ? 'PASS' : 'FAIL';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `## ${emoji} Engine Eval — ${status}`,
                '',
                `F1 floor: 0.70`,
                passed
                  ? 'Engine eval passed. F1 ≥ 0.70.'
                  : '⚠️ Engine eval failed. F1 < 0.70 — check signal regressions before merging.',
                '',
                '_Run `npm run eval -- test-data/realistic_fraud_dataset.csv` locally for the full report._',
              ].join('\n'),
            });
