name: Playwright Audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: playwright-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  critical:
    name: Critical and mobile staging audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT: '1'
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Generate Playwright fixtures
        run: npm run test:fixtures

      - name: Run critical Playwright suite
        run: npx playwright test --config=tests/playwright.config.ts --project=critical --project=mobile

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: tests/reports/html
          if-no-files-found: ignore
          retention-days: 14
