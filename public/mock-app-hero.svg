<svg viewBox="0 0 320 640" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone frame -->
  <rect x="0" y="0" width="320" height="640" rx="40" fill="#1A1814" stroke="#1A1814" stroke-width="8"/>

  <!-- Screen background -->
  <rect x="8" y="8" width="304" height="624" rx="32" fill="#F8F5EE"/>

  <!-- Status bar -->
  <rect x="8" y="8" width="304" height="32" rx="32" fill="#1A1814" opacity="0.05"/>
  <text x="160" y="28" font-family="Arial" font-size="10" fill="#1A1814" text-anchor="middle" font-weight="bold">9:41</text>

  <!-- Top navigation -->
  <rect x="8" y="40" width="304" height="56" fill="transparent" stroke="#D8D0BD" stroke-width="1"/>
  <text x="20" y="58" font-family="Arial" font-size="11" fill="#7B2D26" font-weight="bold">INBOX</text>
  <circle cx="300" cy="68" r="12" fill="#7B2D26"/>
  <text x="300" y="72" font-family="Arial" font-size="10" fill="#F8F5EE" text-anchor="middle" font-weight="bold">3</text>

  <!-- Case file header -->
  <text x="20" y="110" font-family="monospace" font-size="9" fill="#4A4640" font-weight="bold">CASE UN-2026-04-21-0083</text>
  <text x="20" y="122" font-family="Arial" font-size="12" fill="#1A1814" font-weight="600">Alex M████</text>
  <line x1="20" x2="300" y1="128" y2="128" stroke="#D8D0BD" stroke-width="1"/>

  <!-- Content section -->
  <text x="20" y="150" font-family="monospace" font-size="8" fill="#7B2D26" font-weight="bold">RISK SCORE</text>
  <text x="20" y="165" font-family="monospace" font-size="20" fill="#7B2D26" font-weight="bold">0.92</text>

  <text x="20" y="190" font-family="monospace" font-size="8" fill="#4A4640" font-weight="bold">CONFIDENCE</text>
  <text x="20" y="205" font-family="Arial" font-size="12" fill="#1A1814" font-weight="600">DEFINITE</text>

  <text x="20" y="230" font-family="monospace" font-size="8" fill="#4A4640" font-weight="bold">PATTERN</text>
  <text x="20" y="245" font-family="Arial" font-size="11" fill="#4A4640" line-height="1.4">INR claim within 2.4 days</text>
  <text x="20" y="258" font-family="Arial" font-size="11" fill="#4A4640" line-height="1.4">of delivery. Active at 7</text>
  <text x="20" y="271" font-family="Arial" font-size="11" fill="#4A4640" line-height="1.4">merchants.</text>

  <line x1="20" x2="300" y1="280" y2="280" stroke="#D8D0BD" stroke-width="1"/>

  <!-- Signals section -->
  <text x="20" y="300" font-family="monospace" font-size="8" fill="#4A4640" font-weight="bold">SIGNALS FIRED</text>

  <rect x="20" y="310" width="260" height="20" rx="3" fill="#7B2D26" opacity="0.1"/>
  <text x="28" y="325" font-family="Arial" font-size="10" fill="#1A1814">refund_rate_over_60pct</text>

  <rect x="20" y="335" width="260" height="20" rx="3" fill="#7B2D26" opacity="0.1"/>
  <text x="28" y="350" font-family="Arial" font-size="10" fill="#1A1814">cross_merchant_inr_pattern</text>

  <rect x="20" y="360" width="260" height="20" rx="3" fill="#7B2D26" opacity="0.1"/>
  <text x="28" y="375" font-family="Arial" font-size="10" fill="#1A1814">denial_then_chargeback</text>

  <!-- Action button -->
  <rect x="20" y="400" width="260" height="40" rx="4" fill="#7B2D26"/>
  <text x="150" y="427" font-family="Arial" font-size="13" fill="#E8E4D8" text-anchor="middle" font-weight="600">ASSEMBLE CE 3.0</text>

  <!-- Secondary action -->
  <rect x="20" y="450" width="260" height="40" rx="4" fill="transparent" stroke="#D8D0BD" stroke-width="1"/>
  <text x="150" y="477" font-family="Arial" font-size="13" fill="#4A4640" text-anchor="middle" font-weight="600">View Evidence</text>

  <!-- Footer hint -->
  <text x="160" y="610" font-family="Arial" font-size="8" fill="#8A8472" text-anchor="middle">Swipe for more details</text>
</svg>
